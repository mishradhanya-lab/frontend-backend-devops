name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/frontend-and-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install root dependencies
        run: npm ci
      - name: Install backend dependencies
        run: npm run install:backend
      - name: Install frontend dependencies
        run: npm run install:frontend
      - name: Run frontend unit tests
        run: npm run test:frontend:unit
        env:
          CI: true
      - name: Run API tests
        run: npm run test:api:with:servers
      - name: Run UI E2E tests
        run: npm run test:frontend:with:server
      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build + push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build + push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          build-args: REACT_APP_API_URL=${{ secrets.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      - run: terraform validate
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      - run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-push, terraform]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Get AKS credentials
        run: az aks get-credentials --resource-group customer-app-rg --name customer-app-aks --overwrite-existing
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/base/ -n customer-app
          kubectl apply -f k8s/monitoring/ -n customer-app
          kubectl set image deployment/backend backend=${{ env.IMAGE_PREFIX }}/backend:sha-${{ github.sha }} -n customer-app
          kubectl set image deployment/frontend frontend=${{ env.IMAGE_PREFIX }}/frontend:sha-${{ github.sha }} -n customer-app
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n customer-app --timeout=120s
          kubectl rollout status deployment/frontend -n customer-app --timeout=120s
      - name: Verify
        run: |
          kubectl get pods --namespace customer-app
          kubectl get svc --namespace customer-app
          kubectl get ingress --namespace customer-app

